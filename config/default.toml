[browser]
type = "chromium"          # "chromium" | "firefox"
headless = false
viewport_width = 1920
viewport_height = 1080
slow_mo = 0                # ms between playwright actions (0 = fastest)

[recorder]
output_dir = "./recordings"
capture_screenshots = true
screenshot_format = "png"
max_reports_per_test = 50            # 0 disables pruning, keep only latest N reports per test
debounce_click_ms = 200
debounce_typing_ms = 500
capture_dom_snapshot = true
auto_generate_cnl = true
navigation_causation_window_ms = 2000   # nav within this window after click/type is NOT recorded

[executor]
timeout_per_step_s = 10
strategies = ["selector", "embedding", "vlm"]
auto_heal = true
wait_after_action = "networkidle"       # "networkidle" | "domcontentloaded" | "load" | "none"

[executor.selector]
timeout_ms = 5000

[executor.embedding]
model = "nomic-embed-text"
min_cosine_similarity = 0.85
max_candidates = 50
concurrency = 8                         # parallel Ollama embedding requests
ollama_base_url = "http://localhost:11434"

[executor.vlm]
model = "llava:13b"
ollama_base_url = "http://localhost:11434"
temperature = 0.1
max_tokens = 1024

[web]
host = "127.0.0.1"
port = 8000

[variables]
global_file = "config/variables.toml"       # path to global variables TOML

[logging]
level = "INFO"                              # DEBUG | INFO | WARNING | ERROR | CRITICAL
log_file = "logs/sat.log"                   # path to log file (empty = disable file logging)
max_bytes = 5242880                         # 5 MB — rotate when file exceeds this size
backup_count = 5                            # number of rotated backup files to keep
