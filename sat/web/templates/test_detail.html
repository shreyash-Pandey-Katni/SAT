{% extends "base.html" %}
{% block title %}Test Detail{% endblock %}
{% block content %}
<div id="test-detail">
  <p class="loading">Loading…</p>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
const testId = '{{ test_id }}';
(async () => {
  const [res, reportRes] = await Promise.all([
    fetch(`/api/recordings/${testId}`),
    fetch(`/api/recordings/${testId}/reports`),
  ]);
  if (!res.ok) { document.getElementById('test-detail').textContent = 'Not found.'; return; }
  const t = await res.json();
  const reports = reportRes.ok ? await reportRes.json() : [];
  const el = document.getElementById('test-detail');
  el.innerHTML = `
    <div class="page-header">
      <h1>${t.name}</h1>
      <div>
        <a class="btn btn-sm" href="/tests/${t.id}/cnl">Edit CNL</a>
        <a class="btn btn-sm btn-success" href="/tests/${t.id}/execute">Execute</a>
      </div>
    </div>
    <p class="meta">ID: <code>${t.id}</code> · ${t.browser} · ${t.created_at.slice(0,16)}</p>
    <p>Start URL: <a href="${t.start_url}" target="_blank">${t.start_url}</a></p>
    ${t.cnl ? `<pre class="cnl-block">${t.cnl}</pre>` : ''}
    <h3>Actions (${t.actions.length})</h3>
    <table class="table">
      <thead><tr><th>#</th><th>Type</th><th>Selector / Value</th><th>CNL</th></tr></thead>
      <tbody>
        ${t.actions.map(a => `
          <tr>
            <td>${a.step_number}</td>
            <td><code>${a.action_type}</code></td>
            <td>${a.selector?.css || a.selector?.id || a.value || ''}</td>
            <td>${a.cnl_step || ''}</td>
          </tr>`).join('')}
      </tbody>
    </table>
    <h3>Reports (${reports.length})</h3>
    ${reports.length === 0 ? '<p class="empty">No execution reports yet.</p>' : `
      <table class="table">
        <thead><tr><th>Executed</th><th>Status</th><th>Passed</th><th>Failed</th><th>Healed</th><th>Duration</th><th></th></tr></thead>
        <tbody>
          ${reports.map(r => `
            <tr class="${r.status === 'failed' ? 'failed' : r.status === 'passed' ? 'passed' : ''}">
              <td>${new Date(r.executed_at).toLocaleString()}</td>
              <td>${r.status}</td>
              <td>${r.passed}</td>
              <td>${r.failed}</td>
              <td>${r.healed_steps}</td>
              <td>${r.duration_s.toFixed(2)}s</td>
              <td><a class="btn btn-sm" href="/tests/${t.id}/reports/${r.id}">View</a></td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    `}
  `;
})();
</script>
{% endblock %}
